<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stardew Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:sans-serif;background:#f5d78d;margin:0;padding:16px;color:#2b1a10}
.card{background:#fff7d8;border:2px solid #9b6a3c;border-radius:16px;padding:14px;margin-bottom:12px}
button{padding:10px 14px;border:none;border-radius:999px;background:#7b4a2c;color:white;font-weight:bold}
.goal{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #d8b67c}
label{flex:1}
</style>
</head>
<body>
<h1>🌾 Stardew Tracker</h1>

<div class="card">
<p>This version uses stronger browser storage.</p>
<button onclick="resetProgress()">Reset Progress</button>
</div>

<div class="card">
<h2>Perfection Goals</h2>

<div class="goal">
<input type="checkbox" id="goal1" onchange="saveProgress()">
<label for="goal1">Catch every fish</label>
</div>

<div class="goal">
<input type="checkbox" id="goal2" onchange="saveProgress()">
<label for="goal2">Cook every recipe</label>
</div>

<div class="goal">
<input type="checkbox" id="goal3" onchange="saveProgress()">
<label for="goal3">Craft every item</label>
</div>

<div class="goal">
<input type="checkbox" id="goal4" onchange="saveProgress()">
<label for="goal4">Reach max friendships</label>
</div>

</div>

<script>
const STORAGE_KEY = "stardew_tracker_save_v2";

function saveProgress(){
  const data = {
    goal1: document.getElementById("goal1").checked,
    goal2: document.getElementById("goal2").checked,
    goal3: document.getElementById("goal3").checked,
    goal4: document.getElementById("goal4").checked
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);

    document.getElementById("goal1").checked = !!data.goal1;
    document.getElementById("goal2").checked = !!data.goal2;
    document.getElementById("goal3").checked = !!data.goal3;
    document.getElementById("goal4").checked = !!data.goal4;
  }catch(e){
    console.log(e);
  }
}

function resetProgress(){
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

window.addEventListener("load", loadProgress);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
</body>
</html>
